<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bonde de Quixadá · Ambiente Virtual</title>
  <meta name="description" content="Visualização do bonde de Quixadá em um ambiente virtual 3D, sem câmera." />
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
  <link rel="stylesheet" href="css/style.css" />

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
</head>
<body>

  <a-scene embedded background="color: #DCE7E3">
    <a-assets></a-assets>

    <a-sky color="#DCE7E3"></a-sky>

    <a-entity light="type: ambient; intensity: 0.7; color: #FFF6E8"></a-entity>
    <a-entity light="type: directional; intensity: 0.75; color: #FFF6E8" position="2 4 2"></a-entity>

    <a-plane
      rotation="-90 0 0"
      width="40"
      height="40"
      color="#8C7A5B"
      material="roughness: 1; metalness: 0"
    ></a-plane>

    <a-entity
      id="virtual-bonde"
      gltf-model="url(assets/bonde.glb)"
      position="0 0 0"
      rotation="0 0 0"
      scale="1 1 1"
    ></a-entity>

    <a-entity
      id="camera-rig"
      position="0 0 0"
      rotation="0 0 0"
      animation="property: rotation; to: 0 360 0; dur: 26000; loop: true; easing: linear"
    >
      <a-entity camera look-controls position="0 1.6 6"></a-entity>
    </a-entity>
  </a-scene>

  <a href="index.html" class="back-to-ar">
    <span class="material-symbols-rounded icon-inline">arrow_back</span>
    Voltar para o modo AR
  </a>

</body>
</html>
