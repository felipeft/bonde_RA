<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bonde de Quixadá · Ambiente Virtual</title>
  <meta name="description" content="Visualização do bonde de Quixadá em um ambiente virtual 3D, sem câmera." />
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
  <link rel="stylesheet" href="css/style.css" />

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
</head>
<body>

  <a-scene embedded background="color: #FFFFFF" renderer="antialias: true;">
    <a-assets>
      <audio id="narration-audio" preload="none"></audio>
    </a-assets>

    <a-entity light="type: ambient; intensity: 0.9; color: #FFF6E8"></a-entity>
    <a-entity light="type: directional; intensity: 0.55; color: #FFF6E8" position="1 2 1"></a-entity>

    <a-entity
      id="bonde-model"
      position="0 -1 -5"
      rotation="0 0 0"
      scale="1 1 1"
    ></a-entity>

    <a-camera position="0 0 0" look-controls="touchEnabled: false"></a-camera>
  </a-scene>

  <a href="index.html" class="back-to-ar">
    <span class="material-symbols-rounded icon-inline">arrow_back</span>
    Voltar para o modo AR
  </a>

  <script type="module" src="js/app.js"></script>
</body>
</html>
